# Empty by design.
#
# Wave 2 introduced `encrypts :email_address` on User. YAML fixtures load
# directly into the column, bypassing the model — plaintext values land
# as-is and become unfindable via `find_by(email_address:)` (which
# encrypts the lookup value). Tests that need a User now build one via
# `User.create!` in their setup block instead.
